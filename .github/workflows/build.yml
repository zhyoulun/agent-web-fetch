name: Build and Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./src/...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: agent-web-fetch-linux-amd64
          - goos: linux
            goarch: arm64
            output: agent-web-fetch-linux-arm64
          - goos: windows
            goarch: amd64
            output: agent-web-fetch-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output: agent-web-fetch-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: agent-web-fetch-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/${{ matrix.output }}" ./src/cmd

      - name: Package binary
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            archive="agent-web-fetch-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
            cd dist
            zip -9 "../release/${archive}" "${{ matrix.output }}"
          else
            archive="agent-web-fetch-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
            tar -C dist -czf "release/${archive}" "${{ matrix.output }}"
          fi

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    if: always()

    steps:
      - name: Download packaged artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          branch="${REF_NAME//\//-}"
          short_sha="${SHA::7}"
          tag="auto-${branch}-${SHA}"
          title="Auto release ${REF_NAME} @ ${short_sha}"

          shopt -s nullglob
          assets=(release-assets/*)
          if ((${#assets[@]})); then
            (cd release-assets && sha256sum * > checksums.txt)
          else
            : > release-assets/checksums.txt
          fi

          expected=(
            "linux/amd64|agent-web-fetch-linux-amd64.tar.gz"
            "linux/arm64|agent-web-fetch-linux-arm64.tar.gz"
            "windows/amd64|agent-web-fetch-windows-amd64.zip"
            "darwin/amd64|agent-web-fetch-darwin-amd64.tar.gz"
            "darwin/arm64|agent-web-fetch-darwin-arm64.tar.gz"
          )

          {
            echo "# Build Summary"
            echo
            echo "- Commit: \`${SHA}\`"
            echo "- Branch: \`${REF_NAME}\`"
            echo "- Test job: \`${TEST_RESULT}\`"
            echo "- Build matrix: \`${BUILD_RESULT}\`"
            if [[ -n "${HEAD_MESSAGE:-}" ]]; then
              echo "- Commit message: ${HEAD_MESSAGE%%$'\n'*}"
            fi
            echo
            echo "| Platform | Artifact | Result |"
            echo "| --- | --- | --- |"
            for entry in "${expected[@]}"; do
              IFS="|" read -r platform filename <<< "${entry}"
              if [[ -f "release-assets/${filename}" ]]; then
                result="built"
              else
                result="missing"
              fi
              echo "| \`${platform}\` | \`${filename}\` | ${result} |"
            done
            echo
            if [[ -s release-assets/checksums.txt ]]; then
              echo "## Checksums"
              echo
              echo '```text'
              cat release-assets/checksums.txt
              echo '```'
            fi
          } > release-notes.md

          {
            echo "TAG=${tag}"
            echo "TITLE=${title}"
          } >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_MAIN: ${{ github.ref_name == 'main' }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md
          else
            create_args=("$TAG" --target "$SHA" --title "$TITLE" --notes-file release-notes.md)
            if [[ "$IS_MAIN" != "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi

          shopt -s nullglob
          assets=(release-assets/*)
          if ((${#assets[@]})); then
            gh release upload "$TAG" "${assets[@]}" --clobber
          fi
